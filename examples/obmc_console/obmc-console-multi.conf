# OBMC Console Server Configuration - Multiple Devices
# This file demonstrates configuration for multiple console devices

# Global settings
logsize = 256k
logfile = /var/log/obmc-console.log

# Host console - Standard UART
[console.host2]
device = /dev/ttyS0
device-type = uart
local-tty-baud = 115200
socket-path = /var/run/obmc-console-host.sock

# BMC console - VUART device
# [console.bmc]
# device = /dev/ttyS4
# device-type = vuart
# lpc-address = 0x3f8
# sirq = 4
# local-tty-baud = 115200
# socket-path = /var/run/obmc-console-bmc.sock

# Debug shell
[console.debug]
device = /dev/ptmx
device-type = pty
socket-path = /var/run/console-debug.sock
shell-path = /bin/sh
shell-args = -i
# Interactive bash shell
[console.bash]
device = /dev/ptmx
device-type = pty
socket-path = /var/run/console-bash.sock
shell-path = /bin/bash
shell-args = -i

