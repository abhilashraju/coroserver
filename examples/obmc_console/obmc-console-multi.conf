# OBMC Console Server Configuration - Multiple Devices
# This file demonstrates configuration for multiple console devices

# Global settings
logsize = 256k
logfile = /var/log/obmc-console.log

# Host boot console - VUART0 (Main console)
[console.host]
lpc-address = 0x3f8
sirq = 4
console-id = host
logsize = 256k
logfile = /var/log/obmc-console0.log
device = /dev/ttyVUART0
device-type = vuart
socket-path = /var/run/obmc-console-host.sock
local-tty-baud = 115200

# Hypervisor debug console - VUART1
[console.hypervisor1]
lpc-address = 0x2f8
sirq = 3
console-id = hypervisor1
logsize = 256k
logfile = /var/log/obmc-console1.log
device = /dev/ttyVUART1
device-type = vuart
socket-path = /var/run/obmc-console-hypervisor1.sock
local-tty-baud = 115200

# BMC console - VUART device
# [console.bmc]
# device = /dev/ttyS4
