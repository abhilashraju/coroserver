# OBMC Console Server Configuration
# This file configures the console server settings

# LPC address for the UART device
lpc-address = 0x3f8

# Serial IRQ number
sirq = 4

# Local TTY baud rate
local-tty-baud = 115200

# Log buffer size (supports k, M, G suffixes)
logsize = 256k

# Log file path
logfile = /var/log/obmc-console.log

# UART device path (can be overridden by --device command line option)
device = /dev/ttyS0

# Unix socket path (can be overridden by --socket command line option)
socket-path = /tmp/obmc-console.sock

