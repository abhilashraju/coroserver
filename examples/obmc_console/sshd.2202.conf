# SSH daemon configuration for port 2202
# This configuration provides SSH access to the remote console via console_client

# Include common SSH configuration
Include /etc/ssh/sshd_config_common

# Force command to run console_client connecting to remote console socket
ForceCommand /usr/bin/console_client -s /var/run/obmc-console-remote.sock

# Access control - only allow hostconsole group
AllowGroups hostconsole

# Channel timeout - keep sessions alive for up to 60 minutes
ChannelTimeout *=60m

# Disable X11 forwarding
X11Forwarding no

# Disable TCP forwarding
AllowTcpForwarding no

# Disable agent forwarding
AllowAgentForwarding no

# Use privilege separation
UsePrivilegeSeparation sandbox

# Logging
SyslogFacility AUTH
LogLevel INFO

